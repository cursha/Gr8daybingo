project_id = "gr8day-bingo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false

# All functions use the app's own custom JWT (_shared/auth.ts), not Supabase
# Auth — the gateway's own verify_jwt check must stay off so it never rejects
# a valid app token before the function code even runs. Production already
# behaves this way (set via the dashboard); this makes it explicit so local
# `supabase start` matches and a future `functions deploy` can't silently
# regress it.
[functions.admin-settings]
verify_jwt = false
[functions.aihub]
verify_jwt = false
[functions.auth-custom]
verify_jwt = false
[functions.game]
verify_jwt = false
[functions.health]
verify_jwt = false
[functions.payment]
verify_jwt = false
[functions.registration]
verify_jwt = false
[functions.users]
verify_jwt = false
[functions.weekly-member-update]
verify_jwt = false
[functions.weekly-reset]
verify_jwt = false
